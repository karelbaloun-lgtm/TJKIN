    <style>
        /* === FILTRY === */
        .rekordy-filtry {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            align-items: flex-end;
        }
        .filtr-skupina {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filtr-skupina label {
            font-size: 0.78em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--barva-textu, #555);
            opacity: 0.7;
        }
        .filtr-skupina select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            background: var(--pozadi-obsahu, white);
            color: var(--barva-textu, #333);
            cursor: pointer;
            min-width: 160px;
        }
        .filtr-skupina select:focus {
            outline: none;
            border-color: var(--hlavni-barva);
        }

        /* === NADPISY SEKCÍ === */
        .rekord-nadpis {
            padding: 10px 14px;
            border-left: 5px solid var(--hlavni-barva);
            margin: 30px 0 15px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 1.15em;
            text-transform: uppercase;
            border-radius: 0 6px 6px 0;
        }
        .rekord-nadpis.bazen-25 {
            border-color: #e67e22;
            color: #9e5500;
            background: linear-gradient(to right, #fff3e0, var(--pozadi-obsahu, white));
        }
        .rekord-nadpis.bazen-50 {
            border-color: #c0392b;
            color: #922b21;
            background: linear-gradient(to right, #fdecea, var(--pozadi-obsahu, white));
        }

        .cas-rekordu { font-weight: bold; color: #d35400; font-family: monospace; font-size: 1.05em; }
        .jmeno-rekordmana { font-weight: bold; color: var(--hlavni-barva); }
        .prazdny-rekord { color: #bbb; }
        tr.mezera-styl td { border-top: 2px solid var(--zebra-radek, #eee); }

        .zadne-vysledky {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        /* Dark mode */
        body.dark-mode .filtr-skupina select {
            background: #2a2a2a;
            border-color: #444;
            color: #e0e0e0;
        }
        body.dark-mode .rekord-nadpis.bazen-25 {
            color: #f0a060;
            background: linear-gradient(to right, #2a1f10, var(--pozadi-obsahu));
        }
        body.dark-mode .rekord-nadpis.bazen-50 {
            color: #f08080;
            background: linear-gradient(to right, #2a1010, var(--pozadi-obsahu));
        }
        body.dark-mode .prazdny-rekord { color: #444; }

        @media (max-width: 600px) {
            .rekordy-filtry { flex-direction: column; }
            .filtr-skupina select { min-width: 100%; }
        }
    </style>

    // =========================================================

        { nazev: "100m Motýlek",        novyStyl: false },

        { nazev: "50m Motýlek",         novyStyl: false },
        { nazev: "100m Motýlek",        novyStyl: false },
        { nazev: "200m Motýlek",        novyStyl: false },

        { nazev: "50m Prsa",            novyStyl: true  },

        { nazev: "200m Prsa",           novyStyl: false },

        { nazev: "200m Polohový závod", novyStyl: true  },
        { nazev: "400m Polohový závod", novyStyl: false },
    ];

    const KRATKE_KATEGORIE = ["pohar_10", "pohar_9"];

    // =========================================================
    //  RENDEROVÁNÍ
    // =========================================================
    function vykresliRekordy() {
        const katEl    = document.getElementById("filtr-kategorie");
        const kategorie = katEl.value;
        const katNazev  = katEl.options[katEl.selectedIndex].text;
        const pohlavi   = document.getElementById("filtr-pohlavi").value;
        const bazen     = document.getElementById("filtr-bazen").value;
        const vystup    = document.getElementById("rekordy-vystup");

        const discipliny  = KRATKE_KATEGORIE.includes(kategorie) ? DISCIPLINY_KRATKE : DISCIPLINY;
        const bazeny      = bazen   === "oba"  ? [25, 50] : [parseInt(bazen)];
        const pohlaviArr  = pohlavi === "oba"  ? ["M", "Z"] :
                            pohlavi === "muzi" ? ["M"] : ["Z"];
        const pohlaviNazev = { M: "Muži", Z: "Ženy" };

        let html = "";

        for (const b of bazeny) {
            for (const p of pohlaviArr) {
                const nadpisTrida = b === 25 ? "bazen-25" : "bazen-50";
                const emoji       = b === 25 ? "🏊" : "🌊";
                const bazNazev    = b === 25 ? "Krátký bazén (25m)" : "Dlouhý bazén (50m)";

                html += `<h2 class="rekord-nadpis ${nadpisTrida}">${emoji} ${bazNazev} — ${pohlaviNazev[p]} — ${katNazev}</h2>`;
                html += `<div class="table-container"><table style="width:100%">`;
                html += `<thead><tr><th>Disciplína</th><th>Jméno</th><th>Čas ⏱️</th><th>Datum / Místo</th></tr></thead><tbody>`;

                for (const disc of discipliny) {
                    const z = REKORDY.find(r =>
                        r.disciplina === disc.nazev &&
                        r.pohlavi    === p &&
                        r.kategorie  === kategorie &&
                        r.bazen      === b
                    );
                    const trida = disc.novyStyl ? ' class="mezera-styl"' : '';

                    if (z && z.cas) {
                        html += `<tr${trida}>
                            <td>${disc.nazev}</td>
                            <td class="jmeno-rekordmana">${z.jmeno}</td>
                            <td class="cas-rekordu">${z.cas}</td>
                            <td>${z.mistoRok}</td>
                        </tr>`;
                    } else {
                        html += `<tr${trida}>
                            <td>${disc.nazev}</td>
                            <td class="prazdny-rekord">—</td>
                            <td class="prazdny-rekord">—:—</td>
                            <td class="prazdny-rekord">—</td>
                        </tr>`;
                    }
                }

                html += `</tbody></table></div>`;
            }
        }

        vystup.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", vykresliRekordy);
    </script>

</html>
